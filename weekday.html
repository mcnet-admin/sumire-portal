<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>すみれクラブ予約カレンダー</title>
  <style>
    body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
    
    /* モード別メッセージエリア */
    .guide-box { margin: 15px 0; padding: 10px; border-radius: 10px; font-size: 0.9em; font-weight: bold; min-height: 3em; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
    .guide-new { background: #e3f2fd; color: #1976d2; border: 1px solid #1976d2; }
    .guide-change { background: #fff3e0; color: #ef6c00; border: 1px solid #ef6c00; }
    .guide-cancel { background: #ffebee; color: #c62828; border: 1px solid #c62828; }

    .mode-btn { display: inline-block; padding: 10px 18px; margin: 5px; border-radius: 8px; background: #eee; color: #666; font-weight: bold; cursor: pointer; border: none; }
    .mode-btn.active { color: white; }
    #mode-new.active { background: #1976d2; }
    #mode-change.active { background: #ef6c00; }
    #mode-cancel.active { background: #c62828; }

    .btn { display: block; padding: 12px; border-radius: 10px; text-decoration: none; color: white; font-weight: bold; margin-top: 10px; transition: 0.2s; }
    .btn-purple { background: #7e57c2; }
    .btn-disabled { background: #cccccc; pointer-events: none; color: #666; }
    .back { margin-top: 20px; display: inline-block; color: #6a45b0; text-decoration: none; font-size: 0.85em; }
  </style>
</head>
<body>
  <div class="card">
    <h3 style="margin-top:0; color:#444;">予約・変更・取消</h3>
    
    <div style="margin-bottom:10px;">
      <button class="mode-btn active" id="mode-new">新規予約</button>
      <button class="mode-btn" id="mode-change">日時の変更</button>
      <button class="mode-btn" id="mode-cancel">希望の取消</button>
    </div>

    <div id="guide" class="guide-box guide-new">
      【新規】予約したい日を選んでください
    </div>

    <div id="calendar"></div>
    <a href="index.html" class="back">← ポータルに戻る</a>
  </div>

  <script>
    const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSeGWZ6eMGoI0MWQUxt5dzeGJ4O2-j4zpXVnQf_JWXJnz-1U-Q/viewform";
    const entryType = "entry.19338865"; // 利用内容
    const entryDate = "entry.2032664883"; // 統合した日付入力欄ID（※最新を要確認）

    let currentMode = "new";
    const week = ["日","月","火","水","木","金","土"];
    const dObj = new Date();

    // モード切り替え関数
    function switchMode(mode) {
      currentMode = mode;
      const guide = document.getElementById("guide");
      
      // ボタンの見た目更新
      document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
      document.getElementById("mode-" + mode).classList.add("active");

      // メッセージと色の更新
      guide.className = "guide-box guide-" + mode;
      if (mode === "cancel") {
        guide.innerHTML = "【取消】お手元の受付メールを確認し、<br>取り消したい予約日を選んでください";
      } else if (mode === "change") {
        guide.innerHTML = "【変更】お手元のメールを確認の上、<br>新たに希望する日を選び直してください";
      } else {
        guide.innerHTML = "【新規】予約したい日を選んでください";
      }
      renderCalendar();
    }

    document.getElementById("mode-new").onclick = () => switchMode("new");
    document.getElementById("mode-change").onclick = () => switchMode("change");
    document.getElementById("mode-cancel").onclick = () => switchMode("cancel");

    function renderCalendar() {
      const container = document.getElementById("calendar");
      container.innerHTML = "";
      for (let i = 0; i < 14; i++) {
        const d = new Date();
        d.setDate(dObj.getDate() + i);
        const label = `${d.getMonth()+1}/${d.getDate()}（${week[d.getDay()]}）`;

        if (d.getDay() === 0 || d.getDay() === 6) {
          const div = document.createElement("div");
          div.className = "btn btn-disabled";
          div.textContent = label + " (利用不可)";
          container.appendChild(div);
        } else {
          const btn = document.createElement("a");
          btn.className = "btn btn-purple";
          btn.textContent = label;
          
          let typeValue = currentMode === "cancel" ? "希望の取消" : (currentMode === "change" ? "日時の変更" : "新規");

          const params = new URLSearchParams();
          params.append(entryType, typeValue);
          params.append(entryDate, label);
          btn.href = `${formURL}?${params.toString()}`;
          container.appendChild(btn);
        }
      }
    }
    renderCalendar();
  </script>
</body>
</html>
