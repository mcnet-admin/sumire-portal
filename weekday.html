<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>すみれクラブ予約（平日版）</title>
    <style>
        /* スマホで見やすいシンプルなデザイン */
        body { font-family: -apple-system, sans-serif; padding: 15px; background-color: #f8f9fa; }
        .card { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .item { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; }
        select, input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .note { font-size: 12px; color: #666; margin-top: 5px; line-height: 1.4; }
        .error-msg { color: #d32f2f; font-size: 13px; font-weight: bold; margin-top: 5px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>すみれクラブ予約 <span style="font-size: 14px; color: #007bff;">[平日用]</span></h2>
    
    <div id="date-error" class="error-msg"></div>

    <form id="reservation-form">
        <div class="item">
            <label>① クラス</label>
            <select id="class-select" required onchange="updateStudentList()">
                <option value="">選択してください</option>
            </select>
        </div>

        <div class="item">
            <label>② 園児名</label>
            <select id="name-select" required disabled>
                <option value="">クラスを先に選択してください</option>
            </select>
        </div>

        <div class="item">
            <label>③ モード</label>
            <select id="mode-select">
                <option value="新規">新規申込み</option>
                <option value="変更">登録内容の変更</option>
                <option value="取消">予約の取消</option>
            </select>
        </div>

        <div class="item">
            <label>④ 利用希望日</label>
            <input type="date" id="date-select" required onchange="validateDate()">
            <p class="note">
                ※長期休暇（春・夏・冬休み）は選択できません。<br>
                ※平日予約の締め切りは【前日の15:30】です。
            </p>
        </div>

        <div class="item">
            <label>⑤ 早朝預かり（7:30〜）</label>
            <select id="early-time">
                <option value="なし">利用しない</option>
                <option value="あり">利用する</option>
            </select>
        </div>

        <div class="item">
            <label>⑥ 終了時間</label>
            <select id="end-time">
                <option value="15:00">15:00まで</option>
                <option value="16:30">16:30まで</option>
                <option value="18:00">18:00まで（時間外）</option>
            </select>
        </div>

        <div class="item">
            <label>⑦ お迎えの方</label>
            <select id="pickup">
                <option value="母">母</option>
                <option value="父">父</option>
                <option value="その他">その他（備考欄に記入）</option>
            </select>
        </div>

        <div class="item">
            <label>⑧ 備考</label>
            <textarea id="memo" rows="3" placeholder="お迎えがその他の場合や、連絡事項があれば記入してください"></textarea>
        </div>

        <button type="button" class="btn-submit" onclick="handleConfirm()">内容を確認して送信</button>
    </form>
</div>

<script>
    let masterData = {};
    let holidays = [];

    // 1. 初期化処理
    async function init() {
        try {
            const [resS, resH] = await Promise.all([
                fetch('output/students.json'),
                fetch('output/holidays.json')
            ]);
            masterData = await resS.json();
            holidays = await resH.json();

            // クラス一覧の生成
            const classSel = document.getElementById('class-select');
            Object.keys(masterData).forEach(cls => {
                classSel.add(new Option(cls, cls));
            });

            // カレンダーの選択可能範囲を設定（今日〜翌月末）
            const dateInput = document.getElementById('date-select');
            const now = new Date();
            dateInput.min = now.toISOString().split('T')[0];
            const maxDate = new Date(now.getFullYear(), now.getMonth() + 2, 0);
            dateInput.max = maxDate.toISOString().split('T')[0];

        } catch (e) {
            alert("データの読み込みに失敗しました。");
        }
    }

    // 2. クラス選択連動
    function updateStudentList() {
        const classVal = document.getElementById('class-select').value;
        const nameSel = document.getElementById('name-select');
        nameSel.innerHTML = '<option value="">選択してください</option>';
        
        if (classVal && masterData[classVal]) {
            masterData[classVal].forEach(s => {
                nameSel.add(new Option(s.name, s.id));
            });
            nameSel.disabled = false;
        } else {
            nameSel.disabled = true;
        }
    }

    // 3. 日付の妥当性チェック（平日ルール）
    function validateDate() {
        const dateInput = document.getElementById('date-select');
        const selectedDate = dateInput.value;
        const errorDiv = document.getElementById('date-error');
        errorDiv.style.display = "none";

        if (!selectedDate) return;

        // A. 休日リスト（春休み等）に含まれているか
        if (holidays.includes(selectedDate)) {
            errorDiv.innerText = "⚠️ 選択された日は休暇期間です。休暇版フォームを使用してください。";
            errorDiv.style.display = "block";
            dateInput.value = "";
            return;
        }

        // B. 15:30締め切りルールの判定
        const now = new Date();
        const deadline = new Date(selectedDate);
        deadline.setDate(deadline.getDate() - 1); // 前日
        deadline.setHours(15, 30, 0, 0); // 15:30

        if (now > deadline) {
            errorDiv.innerText = "⚠️ 予約締め切り（前日15:30）を過ぎているため、システムからは入力できません。園までお電話ください。";
            errorDiv.style.display = "block";
            dateInput.value = "";
        }
    }

    // 4. 送信処理
    async function handleConfirm() {
        const classVal = document.getElementById('class-select').value;
        const nameSel = document.getElementById('name-select');
        const selectedId = nameSel.value;
        const nameText = nameSel.options[nameSel.selectedIndex]?.text;
        const mode = document.getElementById('mode-select').value;
        const date = document.getElementById('date-select').value;
        const early = document.getElementById('early-time').value;
        const endTime = document.getElementById('end-time').value;
        const pickup = document.getElementById('pickup').value;
        const memo = document.getElementById('memo').value;

        if (!classVal || !selectedId || !date) {
            alert("未入力の項目があります。");
            return;
        }

        // メールアドレス抽出
        const studentsInClass = masterData[classVal] || [];
        const studentInfo = studentsInClass.find(s => s.id === selectedId);
        const email01 = studentInfo ? studentInfo.parent_email01 : "";
        const email02 = studentInfo ? studentInfo.parent_email02 : "";

        if (!confirm(`${date} の予約を「${mode}」で送信してよろしいですか？`)) return;

        const btn = document.querySelector('.btn-submit');
        btn.disabled = true;
        btn.innerText = "送信中...";

        const GITHUB_TOKEN = "ghp_" + "HdcGC3C4iMFU5qigMZXGX7pAS3ASJQ3ybqyS";
        const repo = "mcnet-admin/sumire-portal";
        const path = "data/reservations.json";

        try {
            const res = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                headers: { "Authorization": `token ${GITHUB_TOKEN}` },
                cache: "no-store"
            });
            const fileData = await res.json();
            const currentContent = JSON.parse(decodeURIComponent(escape(atob(fileData.content))));

            const newEntry = {
                id: Date.now(),
                type: "平日版",
                mode: mode,
                date: date,
                class: classVal,
                name: nameText,
                parent_email01: email01,
                parent_email02: email02,
                early_care: early,
                end_time: endTime,
                pickup: pickup,
                memo: memo,
                timestamp: new Date().toLocaleString("ja-JP")
            };

            currentContent.push(newEntry);

            const updateRes = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                method: "PUT",
                headers: { "Authorization": `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: `Weekday Reservation: ${nameText}`,
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(currentContent)))),
                    sha: fileData.sha
                })
            });

            if (updateRes.ok) {
                alert("平日予約が正常に送信されました。");
                location.reload();
            } else {
                throw new Error();
            }
        } catch (e) {
            alert("送信に失敗しました。");
            btn.disabled = false;
            btn.innerText = "内容を確認して送信";
        }
    }

    init();
</script>
</body>
</html>
