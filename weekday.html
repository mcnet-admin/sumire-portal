<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>すみれクラブ予約（平日版）</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 15px; background-color: #f8f9fa; }
        .card { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .item { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; }
        select, input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-back { display: inline-block; margin-bottom: 15px; color: #666; text-decoration: none; font-size: 14px; }
        .note { font-size: 12px; color: #666; margin-top: 5px; line-height: 1.4; }
        .error-msg { color: #d32f2f; font-size: 14px; font-weight: bold; margin-bottom: 15px; background: #fff5f5; padding: 10px; border-radius: 5px; border: 1px solid #ffcdd2; display: none; }
    </style>
</head>
<body>

<div class="card">
    <a href="index.html" class="btn-back">← ポータル画面へ戻る</a>
    <h2>すみれクラブ予約 <span style="font-size: 14px; color: #28a745;">[平日用]</span></h2>
    
    <div id="date-error" class="error-msg"></div>

    <form id="reservation-form">
        <div class="item">
            <label>① クラス</label>
            <select id="class-select" required onchange="updateStudentList()">
                <option value="">選択してください</option>
            </select>
        </div>

        <div class="item">
            <label>② 園児名</label>
            <select id="name-select" required disabled>
                <option value="">クラスを先に選択してください</option>
            </select>
        </div>

        <div class="item">
            <label>③ モード</label>
            <select id="mode-select">
                <option value="新規">新規申込み</option>
                <option value="変更">登録内容の変更</option>
                <option value="取消">予約の取消</option>
            </select>
        </div>

        <div class="item">
            <label>④ 利用希望日</label>
            <input type="date" id="date-select" required onchange="validateDate()">
            <p class="note">※締め切りは前日の15:30です。</p>
        </div>

        <div class="item">
            <label>⑤ 利用時間帯（料金）</label>
            <select id="time-cost-select" required>
                <option value="">選択してください</option>
                <optgroup label="早朝(7:30〜)">
                    <option value="7:30-8:30" data-cost="200">7:30 - 8:30 (¥200)</option>
                </optgroup>
                <optgroup label="保育終了後〜延長">
                    <option value="終了-15:00" data-cost="400">15:00まで (¥400)</option>
                    <option value="終了-16:30" data-cost="600">16:30まで (¥600)</option>
                    <option value="終了-17:00" data-cost="800">17:00まで (¥800)</option>
                    <option value="終了-17:30" data-cost="1000">17:30まで (¥1,000)</option>
                    <option value="終了-18:00" data-cost="1200">18:00まで (¥1,200)</option>
                </optgroup>
            </select>
        </div>

        <div class="item">
            <label>⑥ お迎えの方</label>
            <select id="pickup">
                <option value="母">母</option>
                <option value="父">父</option>
                <option value="その他">その他（備考欄に記入）</option>
            </select>
        </div>

        <div class="item">
            <label>⑦ 備考</label>
            <textarea id="memo" rows="3" placeholder="連絡事項があれば記入してください"></textarea>
        </div>

        <button type="button" class="btn-submit" onclick="handleConfirm()">内容を確認して送信</button>
    </form>
</div>

<script>
    let masterData = {};
    let holidays = [];

    async function init() {
        try {
            const [resS, resH] = await Promise.all([
                fetch('output/students.json'),
                fetch('output/holidays.json')
            ]);
            masterData = await resS.json();
            holidays = await resH.json();

            const classSel = document.getElementById('class-select');
            Object.keys(masterData).forEach(cls => {
                classSel.add(new Option(cls, cls));
            });

            const dateInput = document.getElementById('date-select');
            const now = new Date();
            dateInput.min = now.toISOString().split('T')[0];
        } catch (e) { alert("データ読み込み失敗"); }
    }

    function updateStudentList() {
        const classVal = document.getElementById('class-select').value;
        const nameSel = document.getElementById('name-select');
        nameSel.innerHTML = '<option value="">選択してください</option>';
        if (classVal && masterData[classVal]) {
            masterData[classVal].forEach(s => nameSel.add(new Option(s.name, s.id)));
            nameSel.disabled = false;
        } else { nameSel.disabled = true; }
    }

    function validateDate() {
        const dateInput = document.getElementById('date-select');
        const errorDiv = document.getElementById('date-error');
        errorDiv.style.display = "none";
        if (!dateInput.value) return;

        const isHoliday = holidays.includes(dateInput.value) || holidays.includes(dateInput.value.replace(/-/g, '/'));
        if (isHoliday) {
            errorDiv.innerHTML = `⚠️ 選択された日は休暇期間です。<br><a href="holiday.html">[休暇版フォームはこちら]</a>`;
            errorDiv.style.display = "block";
            dateInput.value = "";
            return;
        }

        const now = new Date();
        const limitDate = new Date(dateInput.value);
        limitDate.setDate(limitDate.getDate() - 1);
        limitDate.setHours(15, 30, 0, 0);

        if (now > limitDate) {
            errorDiv.innerText = "⚠️ 前日15:30を過ぎているため、園までお電話ください。";
            errorDiv.style.display = "block";
            dateInput.value = "";
        }
    }

    async function handleConfirm() {
        const classVal = document.getElementById('class-select').value;
        const nameSel = document.getElementById('name-select');
        const date = document.getElementById('date-select').value;
        const timeSel = document.getElementById('time-cost-select');
        const selectedTime = timeSel.value;
        const cost = timeSel.options[timeSel.selectedIndex]?.dataset.cost || 0;

        if (!classVal || !nameSel.value || !date || !selectedTime) {
            alert("未入力の項目があります。"); return;
        }

        if (!confirm(`合計 ¥${cost} で送信しますか？`)) return;

        const btn = document.querySelector('.btn-submit');
        btn.disabled = true; btn.innerText = "送信中...";


    // 中身を空にします。これでGitHubのAIに消される心配がゼロになります！
        const GITHUB_TOKEN = "";

        const repo = "mcnet-admin/sumire-portal";
        const path = "data/reservations.json";

        try {
            const res = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                headers: { "Authorization": `token ${GITHUB_TOKEN}` }, cache: "no-store"
            });
            const fileData = await res.json();
            const currentContent = JSON.parse(decodeURIComponent(escape(atob(fileData.content))));

            const studentInfo = (masterData[classVal] || []).find(s => s.id === nameSel.value);

            currentContent.push({
                id: Date.now(),
                type: "平日版",
                mode: document.getElementById('mode-select').value,
                date: date,
                class: classVal,
                name: nameSel.options[nameSel.selectedIndex].text,
                time_frame: selectedTime,
                cost: parseInt(cost),
                pickup: document.getElementById('pickup').value,
                memo: document.getElementById('memo').value,
                parent_email01: studentInfo?.parent_email01 || "",
                parent_email02: studentInfo?.parent_email02 || "",
                timestamp: new Date().toLocaleString("ja-JP")
            });

            await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                method: "PUT",
                headers: { "Authorization": `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: `Weekday Res: ${date}`,
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(currentContent)))),
                    sha: fileData.sha
                })
            });

            alert("送信されました。"); location.reload();
        } catch (e) { alert("失敗しました。"); btn.disabled = false; btn.innerText = "送信"; }
    }
    init();
</script>
</body>
</html>
