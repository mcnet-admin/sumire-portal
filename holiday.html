<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>すみれクラブ予約（休暇版）</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 20px; background: #fff3e0; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { font-size: 20px; text-align: center; color: #ef6c00; margin-top: 10px; }
        .btn-back { display: inline-block; margin-bottom: 15px; color: #666; text-decoration: none; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 15px; background: #ff9800; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .info-box { background: #fff8e1; border: 1px solid #ffe082; padding: 10px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; }
        .error-msg { color: #d32f2f; font-size: 14px; font-weight: bold; margin-bottom: 15px; background: #fff5f5; padding: 10px; border-radius: 5px; border: 1px solid #ffcdd2; display: none; }
        .mode-container { display: flex; gap: 10px; margin-top: 5px; }
        .mode-option { flex: 1; position: relative; cursor: pointer; }
        .mode-option input { display: none; }
        .mode-label { display: block; padding: 12px 5px; text-align: center; background: #fff; border: 2px solid #ddd; border-radius: 8px; font-size: 14px; font-weight: bold; color: #666; transition: all 0.2s; }
        .mode-option input:checked + .mode-label { background: #fff3e0; border-color: #ef6c00; color: #ef6c00; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="btn-back">← ポータル画面へ戻る</a>
    <h1>すみれクラブ予約 <span style="font-size: 14px; color: #ef6c00;">[休暇版]</span></h1>
    
    <div class="info-box">※春・夏・冬休み専用です。</div>
    <div id="date-error" class="error-msg"></div>

    <div class="form-group">
        <label>クラス</label>
        <select id="class-select" onchange="updateStudentList()">
            <option value="">選択してください</option>
        </select>
    </div>

    <div class="form-group">
        <label>園児名</label>
        <select id="student-select" disabled>
            <option value="">クラスを先に選択</option>
        </select>
    </div>

    <div class="form-group">
        <label>操作種別</label>
        <div class="mode-container">
            <label class="mode-option"><input type="radio" name="v_mode" value="新規" checked><span class="mode-label">新規</span></label>
            <label class="mode-option"><input type="radio" name="v_mode" value="変更"><span class="mode-label">変更</span></label>
            <label class="mode-option"><input type="radio" name="v_mode" value="取消"><span class="mode-label">取消</span></label>
        </div>
    </div>
 
    <div class="form-group">
        <label>利用希望日</label>
        <input type="date" id="date-select" onchange="validateHolidayDate()">
    </div>

    <button class="btn-submit" onclick="submitForm()">この内容で申し込む</button>
</div>

<script>
    let studentData = {};
    let holidays = [];

    async function initForm() {
        try {
            const [resS, resH] = await Promise.all([
                fetch('output/students.json'),
                fetch('output/holidays.json')
            ]);
            studentData = await resS.json();
            holidays = await resH.json();

            const classSelect = document.getElementById('class-select');
            Object.keys(studentData).forEach(cls => {
                classSelect.add(new Option(cls, cls));
            });

            const dateInput = document.getElementById('date-select');
            const now = new Date();
            dateInput.min = now.toISOString().split('T')[0];
            const maxDate = new Date(now.getFullYear(), now.getMonth() + 2, 0);
            dateInput.max = maxDate.toISOString().split('T')[0];
        } catch (e) { alert("データ読込失敗"); }
    }

    function updateStudentList() {
        const cls = document.getElementById('class-select').value;
        const sSelect = document.getElementById('student-select');
        sSelect.innerHTML = '<option value="">園児名を選択</option>';
        if (cls && studentData[cls]) {
            studentData[cls].forEach(s => sSelect.add(new Option(s.name, s.id)));
            sSelect.disabled = false;
        } else { sSelect.disabled = true; }
    }

    function validateHolidayDate() {
        const dateInput = document.getElementById('date-select');
        const selectedDate = dateInput.value;
        const errorDiv = document.getElementById('date-error');
        errorDiv.style.display = "none";
        if (!selectedDate) return;

        const formattedDateSlash = selectedDate.replace(/-/g, '/');
        const isHoliday = holidays.includes(selectedDate) || holidays.includes(formattedDateSlash);

        if (!isHoliday) {
            errorDiv.innerHTML = `⚠️ この日は長期休暇期間ではありません。<br><a href="weekday.html" style="color: #d32f2f; font-weight: bold;">[平日版フォームはこちら]</a> から入力してください。`;
            errorDiv.style.display = "block";
            dateInput.value = "";
        }
    }

    async function submitForm() {
        const classVal = document.getElementById('class-select').value;
        const sSel = document.getElementById('student-select');
        const selectedId = sSel.value;
        const sName = sSel.options[sSel.selectedIndex]?.text;
        const selectedDate = document.getElementById('date-select').value;
        const modeVal = document.querySelector('input[name="v_mode"]:checked').value;

        if (!classVal || !selectedId || !selectedDate) {
            alert("未入力項目があります。"); return;
        }

        const studentInfo = (studentData[classVal] || []).find(s => s.id === selectedId);
        const email01 = studentInfo ? studentInfo.parent_email01 : "";
        const email02 = studentInfo ? studentInfo.parent_email02 : "";

        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const target = new Date(selectedDate);
        const limit = new Date(target);
        limit.setDate(target.getDate() - 14);

        if (today > limit) {
            const diff = Math.ceil((target - today) / (86400000));
            if (!confirm(`【キャンセル料確認】利用まであと ${diff} 日です。これ以降の変更・取消は料が発生しますが、よろしいですか？`)) return;
        }

        if (!confirm(`${selectedDate} を「${modeVal}」で送信しますか？`)) return;

        const btn = document.querySelector('.btn-submit');
        btn.disabled = true; btn.innerText = "送信中...";

        const GITHUB_TOKEN = "ghp_" + "HdcGC3C4iMFU5qigMZXGX7pAS3ASJQ3ybqyS";
        const repo = "mcnet-admin/sumire-portal";
        const path = "data/reservations.json";

        try {
            const res = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                headers: { "Authorization": `token ${GITHUB_TOKEN}` }, cache: "no-store"
            });
            const fileData = await res.json();
            const currentContent = JSON.parse(decodeURIComponent(escape(atob(fileData.content))));

            currentContent.push({
                id: Date.now(), type: "休暇版", mode: modeVal, date: selectedDate,
                class: classVal, name: sName, parent_email01: email01, parent_email02: email02,
                timestamp: new Date().toLocaleString("ja-JP")
            });

            const updateRes = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                method: "PUT",
                headers: { "Authorization": `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: `Holiday Reservation: ${sName}`,
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(currentContent)))),
                    sha: fileData.sha
                })
            });

            if (updateRes.ok) { alert("正常に送信されました。"); location.reload(); }
            else { throw new Error(); }
        } catch (e) {
            alert("送信失敗"); btn.disabled = false; btn.innerText = "この内容で申し込む";
        }
    }
    initForm();
</script>
</body>
</html>
