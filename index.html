<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>すみれクラブ 予約ポータル</title>
    <style>
        /* スマホ向けレスポンシブデザイン */
        body { font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; margin: 0; padding: 20px; background: #f4f7f9; color: #333; line-height: 1.6; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        h1 { font-size: 22px; margin-bottom: 10px; color: #2c3e50; }
        .date-display { font-size: 16px; color: #7f8c8d; margin-bottom: 25px; }
        
        /* 状態表示バッジ */
        .status-card { 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            font-weight: bold; 
            font-size: 18px; 
            text-align: center; /* 判定テキストを中央揃え */
        }
        .is-normal { background: #e3f2fd; color: #1976d2; border: 1px solid #bbdefb; }
        .is-holiday { background: #fff3e0; color: #ef6c00; border: 1px solid #ffe0b2; }

        /* 大きなボタン */
        .btn { 
            display: block; 
            width: 100%;
            padding: 22px 0;
            margin: 15px 0;
            border: none; 
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            text-align: center; /* ボタンテキストを中央揃え */
            transition: transform 0.2s, box-shadow 0.2s;
            box-sizing: border-box; 
        }

        .btn:active { transform: scale(0.98); }
        
        .btn-weekday { background: #007bff; color: white; box-shadow: 0 4px 15px rgba(0,123,255,0.3); }
        .btn-holiday { background: #ff9800; color: white; box-shadow: 0 4px 15px rgba(255,152,0,0.3); }
        
        /* 完全に無効化するスタイル */
        .btn-disabled {
            background-color: #d1d5db !important; /* グレー */
            color: #9ca3af !important;
            box-shadow: none !important;
            pointer-events: none; /* クリック不可 */
            transform: none !important;
            opacity: 0.6;
        }
        
        .deadline-warning { background: #fee; color: #d32f2f; padding: 10px; border-radius: 8px; font-size: 14px; margin-top: 20px; border: 1px solid #ffcdd2; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>すみれクラブ 予約ポータル</h1>
    <div id="today-date" class="date-display"></div>
    
    <div id="status-area" class="status-card">判定中...</div>

    <a href="weekday.html" id="btn-w" class="btn btn-weekday">平日版 予約フォームへ</a>
    <a href="holiday.html" id="btn-h" class="btn btn-holiday">休暇版 予約フォームへ</a>

    <div id="deadline-msg" class="deadline-warning">
        ⚠️ 本日の受付（明日の予約・変更）は15:30で終了しました。緊急の連絡は園までお電話ください。
    </div>
</div>

<script>
    async function initPortal() {
        const now = new Date();
        const y = now.getFullYear();
        const m = now.getMonth() + 1;
        const d = now.getDate();
        const todayStr = `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        
        document.getElementById('today-date').innerText = `本日：${y}年${m}月${d}日`;

        try {
            const res = await fetch('output/holidays.json');
            const holidays = await res.json();
            
            const statusArea = document.getElementById('status-area');
            const btnW = document.getElementById('btn-w');
            const btnH = document.getElementById('btn-h');

            if (holidays.includes(todayStr)) {
                statusArea.innerText = "🌸 現在は【休暇期間】です";
                statusArea.className = "status-card is-holiday";
                btnW.classList.add('btn-disabled');
            } else {
                statusArea.innerText = "🏫 現在は【平日期間】です";
                statusArea.className = "status-card is-normal";
                btnH.classList.add('btn-disabled');
            }
            
            const deadline = new Date();
            deadline.setHours(15, 30, 0);
            if (now > deadline) {
                document.getElementById('deadline-msg').style.display = "block";
            }

        } catch (e) {
            console.error("データの読み込みに失敗しました", e);
            document.getElementById('status-area').innerText = "データ読み込みエラー";
        }
    }
    initPortal();
</script>
</body>
</html>
