<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>すみれクラブ 予約ポータル</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { --main-purple: #7e57c2; --hover-purple: #6a45b0; --bg-color: #f0f2f5; --disabled-color: #e0e0e0; }
    body { font-family: sans-serif; background: var(--bg-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 95%; max-width: 400px; }
    h3 { color: var(--main-purple); margin-bottom: 10px; }
    .today-box { font-size: 1em; font-weight: bold; margin-bottom: 15px; color: #555; }
    
    /* リスト形式のグリッド */
    .calendar-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
    
    .date-cell { 
      padding: 15px 5px; border-radius: 12px; background: #fff; border: 2px solid #eee; 
      cursor: pointer; transition: 0.2s; font-size: 0.95em; font-weight: bold; line-height: 1.4;
    }
    .date-cell:hover:not(.disabled) { border-color: var(--main-purple); background: #f3efff; }
    
    /* 無効な日のスタイル */
    .date-cell.disabled { 
      background: var(--disabled-color); border-color: #d0d0d0; color: #888; cursor: not-allowed; 
    }
    .reason-tag { font-size: 0.7em; font-weight: normal; display: block; margin-top: 4px; color: #999; }

    .info-text { font-size: 0.8em; color: #777; margin-top: 20px; text-align: left; line-height: 1.5; background: #f9f9f9; padding: 10px; border-radius: 8px; }
  </style>
</head>
<body>

<div class="card">
  <h3>すみれクラブ 予約ポータル</h3>
  <div id="today-display" class="today-box"></div>
  
  <p style="font-size: 0.9em; color: #666;">希望する日付を選択してください（2週間先まで）</p>

  <div class="calendar-grid" id="calendar-grid">
    </div>

  <div class="info-text">
    <i class="fas fa-info-circle"></i> 翌月分の予約は毎月10日から可能です。<br>
    <i class="fas fa-clock"></i> 変更・取消は前日の15:30までとなります。<br>
    <i class="fas fa-phone"></i> 締切後や当日の欠席等は、園まで直接お電話ください。
  </div>
</div>

<script>
  // --- 基本設定 ---
  const ENTRY_ID = "entry.1684633535";
  const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSeGWZ6eMGoI0MWQUxt5dzeGJ4O2-j4zpXVnQf_JWXJnz-1U-Q/viewform";
  const weekLabels = ["日","月","火","水","木","金","土"];
  
  // --- 休日一覧 (2026_休日一覧シートより反映) ---
  const HOLIDAYS = [
    "2026-03-20", "2026-03-23", "2026-03-24", "2026-03-25", "2026-03-26", "2026-03-27", "2026-03-30",
    "2026-03-31", "2026-04-01", "2026-04-08", "2026-04-13"
  ];

  const now = new Date();

  function generateDateList() {
    const grid = document.getElementById("calendar-grid");
    const todayDisp = document.getElementById("today-display");
    
    // 今日の日付を表示
    todayDisp.textContent = `本日：${now.getMonth()+1}/${now.getDate()}（${weekLabels[now.getDay()]}）`;
    
    grid.innerHTML = ''; 

    // 今日から14日間をループ
    for (let i = 1; i <= 14; i++) {
      const target = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      target.setDate(target.getDate() + i);
      
      const Y = target.getFullYear();
      const M = target.getMonth() + 1;
      const D = target.getDate();
      const dayStr = `${Y}-${String(M).padStart(2,'0')}-${String(D).padStart(2,'0')}`;
      const displayStr = `${M}/${D}(${weekLabels[target.getDay()]})`;

      const cell = document.createElement("div");
      cell.className = "date-cell";

      let isDisabled = false;
      let reason = "";

      // --- 判定ロジック ---
      
      // 1. 土日チェック
      if (target.getDay() === 0 || target.getDay() === 6) {
        isDisabled = true;
        reason = "休園日";
      } 
      // 2. 休日一覧（行事・休暇）チェック
      else if (HOLIDAYS.includes(dayStr)) {
        isDisabled = true;
        reason = "園行事・協力日";
      } 
      // 3. 翌月10日解禁ルール（今日が10日未満なら、翌月の日付は出さない）
      else if (now.getDate() < 10 && target.getMonth() !== now.getMonth()) {
        isDisabled = true;
        reason = "10日解禁";
      } 
      // 4. 前日15:30締切判定（明日がターゲットで、今日が15:30を過ぎている場合）
      else if (i === 1 && (now.getHours() > 15 || (now.getHours() === 15 && now.getMinutes() >= 31))) {
        isDisabled = true;
        reason = "受付終了";
      }

      // --- HTML生成 ---
      if (isDisabled) {
        cell.classList.add("disabled");
        cell.innerHTML = `${displayStr}<span class="reason-tag">${reason}</span>`;
      } else {
        cell.textContent = displayStr;
        cell.onclick = () => {
          // フォームへ日付を飛ばす
          const dateParam = `${M}/${D}(${weekLabels[target.getDay()]})`;
          const finalUrl = `${FORM_URL}?usp=pp_url&${ENTRY_ID}=${encodeURIComponent(dateParam)}`;
          window.location.href = finalUrl;
        };
      }
      grid.appendChild(cell);
    }
  }

  // ページロード時に実行
  window.onload = generateDateList;
</script>

</body>
</html>
