<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>すみれクラブ予約ポータル</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 450px; width: 100%; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #333; font-size: 22px; margin-bottom: 10px; }
        .description { color: #666; font-size: 14px; margin-bottom: 25px; line-height: 1.6; }
        
        .selection-box { background: #fff9f0; border: 1px solid #ffe0b2; padding: 15px; border-radius: 12px; margin-bottom: 25px; text-align: left; }
        .selection-box h2 { font-size: 16px; color: #e65100; margin: 0 0 10px 0; display: flex; align-items: center; }
        
        .btn { display: block; width: 100%; padding: 18px; margin-bottom: 15px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; text-decoration: none; transition: transform 0.1s; }
        .btn:active { transform: scale(0.98); }
        
        .btn-weekday { background-color: #4caf50; color: white; }
        .btn-holiday { background-color: #ff9800; color: white; }
        
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 15px; }
        .status-vacation { background: #fff3e0; color: #ef6c00; border: 1px solid #ffcc80; }
        .status-normal { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }

        .footer-note { font-size: 12px; color: #999; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div id="period-status"></div>
    <h1>すみれクラブ予約ポータル</h1>
    
    <div class="description">
        予約したいお日にちに合わせて、<br>ボタンを選択してください。
    </div>

    <div class="selection-box">
        <h2>💡 どちらを選べばいいですか？</h2>
        <p style="font-size: 13px; margin: 5px 0;">
            ✅ <b>通常の登園日</b>（新学期など）の予約<br>
            　→ <span style="color:#4caf50; font-weight:bold;">平日版</span> を選択<br><br>
            ✅ <b>長期休暇中</b>（夏・冬・春休み）の予約<br>
            　→ <span style="color:#ff9800; font-weight:bold;">休暇版</span> を選択
        </p>
    </div>

    <a href="weekday.html" class="btn btn-weekday">🟢 平日版 の予約・変更</a>
    <a href="holiday.html" class="btn btn-holiday">🟠 休暇版 の予約・変更</a>

    <div class="footer-note">
        ※平日予約の締め切りは前日15:30までです。<br>
        ※休暇版の変更・取消は14日前まで無料です。
    </div>
</div>

<script>
    async function checkCurrentStatus() {
        try {
            const res = await fetch('output/holidays.json');
            const holidays = await res.json();
            
            const today = new Date().toISOString().split('T')[0];
            const statusDiv = document.getElementById('period-status');
            
            if (holidays.includes(today)) {
                statusDiv.innerHTML = '<span class="status-badge status-vacation">🌸 現在：長期休暇期間（春休み）です</span>';
            } else {
                statusDiv.innerHTML = '<span class="status-badge status-normal">🏫 現在：通常登園期間です</span>';
            }
        } catch (e) {
            console.log("Status check failed");
        }
    }
    checkCurrentStatus();
</script>

</body>
</html>
