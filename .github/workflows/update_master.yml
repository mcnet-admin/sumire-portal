name: Update Student Master

on:
  push:
    paths:
      - 'data/finalDB.xlsx'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl

      - name: Run master_generator
        run: |
          # フォルダ構成に合わせてパスを修正しました
          python scripts/master_generator.py

      - name: Commit and Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        run: |
          git config --global user.name "denton-admin-bot"
          git config --global user.email "denton@mclean.ed.jp"
          # outputフォルダ内の全jsonファイルを保存対象にします
          git add output/*.json
          git commit -m "Update master data from Excel [skip ci]" || echo "No changes to commit"
          git push