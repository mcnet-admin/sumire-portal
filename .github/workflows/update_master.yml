name: Update Student Master

on:
  push:
    paths:
      - 'data/finalDB.xlsx'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl

      - name: Run master_generator
        run: |
          # scriptsフォルダに移動してから実行することでパスのズレを防ぎます
          cd scripts
          python master_generator.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Commit and Push changes
        run: |
          git config --global user.name "denton-admin-bot"
          git config --global user.email "denton@mclean.ed.jp"
          # 全てのjsonファイルの変更をチェックして保存
          git add output/*.json
          git commit -m "Update master data from Excel [skip ci]" || echo "No changes to commit"
          git push