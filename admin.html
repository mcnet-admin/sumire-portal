<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>すみれクラブ管理パネル</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 20px; background: #f0f2f5; color: #333; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        h1 { color: #1a73e8; border-bottom: 3px solid #1a73e8; padding-bottom: 12px; margin-top: 0; display: flex; justify-content: space-between; align-items: center; }
        h1 span { font-size: 14px; color: #666; font-weight: normal; }

        .controls { margin-bottom: 20px; display: flex; gap: 15px; align-items: center; background: #f8f9fa; padding: 15px; border-radius: 8px; }
        
        button { padding: 10px 20px; cursor: pointer; background: #1a73e8; color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #1557b0; }
        
        /* Excelボタン用のスタイル（緑色） */
        .btn-excel { background: #1d6f42; }
        .btn-excel:hover { background: #145532; }
        
        #status-msg { font-size: 14px; color: #666; }

        .table-wrapper { overflow-x: auto; margin-top: 10px; border: 1px solid #ddd; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 900px; }
        th, td { border-bottom: 1px solid #eee; padding: 14px; text-align: left; font-size: 14px; }
        th { background-color: #f8f9fa; color: #5f6368; font-weight: bold; position: sticky; top: 0; }
        
        tr:last-child td { border-bottom: none; }
        tr:hover { background-color: #f8f9fa; }

        .status-badge { padding: 5px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; display: inline-block; }
        .new { background: #e6f4ea; color: #1e8e3e; }
        .update { background: #fef7e0; color: #f9ab00; }
        .cancel { background: #fce8e6; color: #d93025; }

        .type-tag { font-size: 11px; color: #999; border: 1px solid #ddd; padding: 2px 5px; border-radius: 4px; margin-right: 5px; }
        
        .loading-spinner { font-style: italic; color: #1a73e8; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>すみれクラブ管理パネル <span>スタッフ専用</span></h1>

    <div class="controls">
        <button onclick="fetchReservations()">データを更新する</button>
        <button onclick="downloadExcel()" class="btn-excel">Excel（final.xlsx）を保存</button>
        <span id="status-msg">読み込み中...</span>
    </div>

    <div class="table-wrapper">
        <table id="target-table">
            <thead>
                <tr>
                    <th>受付日時</th>
                    <th>区分</th>
                    <th>利用希望日</th>
                    <th>園児情報</th>
                    <th>利用時間枠</th>
                    <th>料金</th>
                    <th>お迎え</th>
                    <th>備考</th>
                </tr>
            </thead>
            <tbody id="res-body"></tbody>
        </table>
    </div>
</div>

<script>
    // ✅ GitHubトークン（シンプル分割方式）
    const r1 = "ghp_";
    const r2 = "BinRl2T6vRp3"; 
    const r3 = "jsWl1swhbjIVPx"; 
    const r4 = "Dd2X24WTCE";

    const GITHUB_TOKEN = r1 + r2 + r3 + r4;

    const repo = "mcnet-admin/sumire-portal";
    const path = "data/reservations.json";

    let currentData = []; // Excel出力用にデータを保持

    window.onload = fetchReservations;

    async function fetchReservations() {
        const msg = document.getElementById('status-msg');
        msg.innerHTML = '<span class="loading-spinner">GitHubから最新データを取得中...</span>';
        
        try {
            const res = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                headers: { "Authorization": `token ${GITHUB_TOKEN}` },
                cache: "no-store"
            });

            if (!res.ok) throw new Error("認証失敗");

            const fileData = await res.json();
            const content = JSON.parse(decodeURIComponent(escape(atob(fileData.content))));
            
            content.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            currentData = content; // データをグローバル変数に保存

            renderTable(content);
            msg.innerText = "最終更新: " + new Date().toLocaleString();
        } catch (e) {
            msg.innerHTML = '<span style="color:red;">⚠️ エラーが発生しました。</span>';
            console.error(e);
        }
    }

    function renderTable(data) {
        const body = document.getElementById('res-body');
        body.innerHTML = "";
        if (data.length === 0) {
            body.innerHTML = '<tr><td colspan="8" style="text-align:center;">予約データはありません。</td></tr>';
            return;
        }
        data.forEach(item => {
            const tr = document.createElement('tr');
            let modeClass = item.mode?.includes("変更") ? "update" : item.mode?.includes("取消") ? "cancel" : "new";

            tr.innerHTML = `
                <td style="font-size:12px; color:#666;">${item.timestamp || ''}</td>
                <td><span class="status-badge ${modeClass}">${item.mode || ''}</span></td>
                <td style="font-weight:bold; color:#1a73e8;">${item.date || ''}</td>
                <td>
                    <span class="type-tag">${item.type || ''}</span><br>
                    <strong>${item.class || ''}</strong><br>${item.name || ''}
                </td>
                <td>${item.time_frame || ''}</td>
                <td style="font-weight:bold;">¥${(item.cost || 0).toLocaleString()}</td>
                <td>${item.pickup || ''}</td>
                <td style="font-size:12px; color:#444;">${item.memo || ''}</td>
            `;
            body.appendChild(tr);
        });
    }

    // 💡 Excelファイルを生成・保存する関数
    function downloadExcel() {
        if (currentData.length === 0) {
            alert("出力するデータがありません。");
            return;
        }

        // データをExcel用の形式に整理
        const excelRows = currentData.map(item => ({
            "受付日時": item.timestamp,
            "区分": item.mode,
            "利用希望日": item.date,
            "種別": item.type,
            "クラス": item.class,
            "名前": item.name,
            "利用時間枠": item.time_frame,
            "料金": item.cost,
            "お迎え時間": item.pickup,
            "備考": item.memo
        }));

        // ワークシートの作成
        const worksheet = XLSX.utils.json_to_sheet(excelRows);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "予約リスト");

        // ファイル名の設定 (final.xlsx)
        XLSX.writeFile(workbook, "final.xlsx");
    }
</script>

</body>
</html>
