<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>【管理者】すみれクラブ配置・集計ダッシュボード</title>
    <script src="https://smtpjs.com/v3/smtp.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f8f9fa; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { border-left: 6px solid #1976d2; padding-left: 15px; font-size: 24px; }
        .section { margin-bottom: 30px; padding: 20px; border: 1px solid #e0e0e0; border-radius: 8px; }
        .grid { display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background: #f5f5f5; color: #666; font-size: 14px; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-blue { background: #1976d2; color: white; }
        .btn-green { background: #2e7d32; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>すみれクラブ 管理者パネル</h1>

    <div class="section" style="background: #e8f5e9; border: 2px solid #4caf50;">
        <strong>🔑 セキュリティ認証（毎回入力してください）</strong>
        <div class="grid" style="margin-top:10px;">
            <div>
                <label style="display:block; font-size:12px;">GitHub Token (ghp_...)</label>
                <input type="password" id="gh-token" style="width:250px;" placeholder="先ほどコピーしたghpから始まる英数字">
            </div>
            <div>
                <label style="display:block; font-size:12px;">Gmailアプリパスワード</label>
                <input type="password" id="app-pass" style="width:200px;" placeholder="新しく発行した16桁">
            </div>
            <button class="btn btn-green" onclick="loadInitialData()">① データを読み込む</button>
        </div>
        <p style="font-size:11px; color:#666; margin-top:10px;">※ GitHubに怒られないための安全対策です。入力した情報は保存されません。</p>
    </div>

    <div class="section">
        <h3>📅 スタッフ配置確認（配置用リスト送信）</h3>
        <div class="grid">
            <div>
                <label style="display:block; font-size:12px;">表示・送信対象日</label>
                <input type="date" id="target-date" onchange="refreshView()">
            </div>
            <button class="btn btn-blue" onclick="sendStaffEmail()">② この日のリストを自分宛に送信</button>
        </div>
        <div id="summary-badges" class="grid" style="margin-top:20px;">
            <div style="background:#e3f2fd; padding:10px; border-radius:50px;">変更・延長：<span id="total-count">0</span>名</div>
        </div>
        <table id="daily-table">
            <thead>
                <tr><th>クラス</th><th>園児名</th><th>時間帯</th><th>お迎え</th><th>備考</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    const ADMIN_EMAIL = "mcnet-admin@mclean.ed.jp";
    let reservations = [];

    // --- GitHubからデータ読み込み（手動起動） ---
    async function loadInitialData() {
        const token = document.getElementById('gh-token').value;
        if(!token) { alert("GitHub Tokenを入力してください"); return; }

        try {
            const url = `https://api.github.com/repos/mcnet-admin/sumire-portal/contents/data/reservations.json`;
            const res = await fetch(url, {
                headers: { "Authorization": `token ${token}` },
                cache: "no-store"
            });
            if (!res.ok) throw new Error("認証失敗。Tokenが間違っているか、無効です。");
            
            const data = await res.json();
            const content = decodeURIComponent(escape(atob(data.content)));
            reservations = JSON.parse(content);
            
            // 園児名簿（これは公開情報なのでそのまま）
            const stuRes = await fetch("output/students.json");
            const stuData = await stuRes.json();
            
            alert("✅ データの読み込みに成功しました！");
            refreshView();
        } catch (e) { 
            alert("❌ 読み込みエラー: " + e.message);
        }
    }

    function refreshView() {
        const target = document.getElementById('target-date').value;
        const filtered = reservations.filter(r => r.date === target);
        const tbody = document.querySelector("#daily-table tbody");
        tbody.innerHTML = filtered.map(r => `
            <tr><td>${r.class}</td><td>${r.name}</td><td>${r.time_frame}</td><td>${r.pickup}</td><td>${r.memo || ""}</td></tr>
        `).join('');
        document.getElementById('total-count').innerText = filtered.length;
    }

    function sendStaffEmail() {
        const pass = document.getElementById('app-pass').value;
        const target = document.getElementById('target-date').value;
        if(!pass) { alert("Gmailアプリパスワードを入力してください"); return; }
        if(reservations.length === 0) { alert("先に『データを読み込む』を押してください"); return; }

        const filtered = reservations.filter(r => r.date === target);
        let tableHtml = `<table border="1" style="border-collapse:collapse; width:100%;">
            <tr style="background:#f5f5f5;"><th>クラス</th><th>名</th><th>時間</th><th>備考</th></tr>
            ${filtered.map(r => `<tr><td>${r.class}</td><td>${r.name}</td><td>${r.time_frame}</td><td>${r.memo || ""}</td></tr>`).join('')}
        </table>`;

        alert("送信を開始します...");

        Email.send({
            Host: "smtp.gmail.com",
            Username: ADMIN_EMAIL,
            Password: pass, 
            To: ADMIN_EMAIL,
            From: ADMIN_EMAIL,
            Subject: `【最新】${target} すみれ配置リスト`,
            Body: `<h3>${target} の予約（${filtered.length}名）</h3>` + tableHtml
        }).then(message => {
            alert("結果: " + message);
        });
    }

    window.onload = () => {
        document.getElementById('target-date').value = new Date().toISOString().split('T')[0];
    };
</script>
</body>
</html>
